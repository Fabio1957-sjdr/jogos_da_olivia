<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Virtual Piano</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width:100vw; height:100vh; overflow:hidden;
      background:linear-gradient(180deg,#110500 0%,#2a1205 50%,#110500 100%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      font-family:'Arial Rounded MT Bold',Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
      user-select:none; -webkit-user-select:none;
      gap:0.5rem;
    }
    .btn-home {
      position:fixed; top:14px; left:14px;
      background:rgba(245,215,142,0.12); border:1.5px solid rgba(245,215,142,0.25);
      border-radius:10px; padding:0.3rem 0.7rem;
      color:rgba(245,215,142,0.65); font-size:1.1rem; text-decoration:none;
    }
    h1 {
      color:#f5d78e; font-size:1.55rem; letter-spacing:0.08em;
      text-shadow:0 2px 12px rgba(245,215,142,0.25); text-align:center;
    }
    .nota-display {
      min-width:90px; height:34px;
      background:rgba(245,215,142,0.07); border:1px solid rgba(245,215,142,0.18);
      border-radius:18px; display:flex; align-items:center; justify-content:center;
      color:#f5d78e; font-size:1.1rem; letter-spacing:0.06em;
      padding:0 1.2rem; transition:color 0.15s;
    }
    .piano-frame {
      background:linear-gradient(to bottom,#1c0903,#0d0400);
      border:3px solid #3d2008; border-radius:8px 8px 12px 12px;
      padding:12px 12px 0;
      box-shadow:0 10px 40px rgba(0,0,0,0.75), inset 0 1px 0 rgba(255,200,100,0.06);
    }
    .piano-keys { position:relative; background:#111; }
    .key {
      position:absolute; cursor:pointer; border-radius:0 0 6px 6px;
      -webkit-tap-highlight-color:transparent;
    }
    .key.white {
      background:linear-gradient(180deg,#e0e0e0 0%,#fafafa 8%,#f0f0f0 80%,#d8d8d8 100%);
      border:1px solid #aaa; border-top:2px solid #ccc; z-index:1;
      display:flex; flex-direction:column; justify-content:flex-end; align-items:center;
      padding-bottom:6px;
      box-shadow:1px 0 2px rgba(0,0,0,0.15);
    }
    .key.white.pressed {
      background:linear-gradient(180deg,#b8cce8 0%,#c8dcf0 8%,#bcd0ea 80%,#aac0de 100%);
      box-shadow:inset 0 3px 8px rgba(0,0,80,0.2);
    }
    .key.black {
      background:linear-gradient(160deg,#303030 0%,#0f0f0f 55%,#252525 100%);
      border:1px solid #000; border-bottom:2px solid #3a3a3a; z-index:2;
      box-shadow:2px 6px 12px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .key.black.pressed {
      background:linear-gradient(160deg,#1a2a4a 0%,#0f1a3a 55%,#1a2a4a 100%);
      box-shadow:1px 2px 5px rgba(0,0,0,0.6), inset 0 2px 6px rgba(0,0,80,0.3);
      transform:translateY(2px);
    }
    .key-label {
      font-family:Arial,sans-serif; font-size:clamp(8px,1.3vw,11px);
      color:#888; line-height:1; pointer-events:none;
    }
    .key-label.c-mark { color:#b87a20; font-weight:bold; font-size:clamp(9px,1.4vw,12px); }
    .key-kb {
      font-family:Arial,sans-serif; font-size:clamp(6px,1.1vw,9px);
      color:#b0b0b0; line-height:1; margin-top:2px; pointer-events:none;
    }
    .hint {
      color:rgba(245,215,142,0.28); font-size:0.68rem;
      font-weight:normal; text-align:center; padding:0 10px;
    }
  </style>
</head>
<body>
  <a href="index.html" class="btn-home">🏠</a>
  <h1>🎹 Virtual Piano</h1>
  <div class="nota-display" id="notaDisplay">—</div>
  <div class="piano-frame">
    <div class="piano-keys" id="pianoKeys"></div>
  </div>
  <div class="hint" id="hint"></div>

  <script>
    /* ── Key data ──────────────────────────────────────────────
       wPos: white keys = integer index 0–14
             black keys = left-edge in white-key-width units
                          (centered on the white-key boundary)      */
    const KEYS = [
      // Octave 4
      {note:'C4',  freq:261.63, type:'white', wPos:0,     label:'C4', kb:'a'},
      {note:'C#4', freq:277.18, type:'black', wPos:0.70,  label:'',   kb:'w'},
      {note:'D4',  freq:293.66, type:'white', wPos:1,     label:'D',  kb:'s'},
      {note:'D#4', freq:311.13, type:'black', wPos:1.70,  label:'',   kb:'e'},
      {note:'E4',  freq:329.63, type:'white', wPos:2,     label:'E',  kb:'d'},
      {note:'F4',  freq:349.23, type:'white', wPos:3,     label:'F',  kb:'f'},
      {note:'F#4', freq:369.99, type:'black', wPos:3.70,  label:'',   kb:'t'},
      {note:'G4',  freq:392.00, type:'white', wPos:4,     label:'G',  kb:'g'},
      {note:'G#4', freq:415.30, type:'black', wPos:4.70,  label:'',   kb:'y'},
      {note:'A4',  freq:440.00, type:'white', wPos:5,     label:'A',  kb:'h'},
      {note:'A#4', freq:466.16, type:'black', wPos:5.70,  label:'',   kb:'u'},
      {note:'B4',  freq:493.88, type:'white', wPos:6,     label:'B',  kb:'j'},
      // Octave 5
      {note:'C5',  freq:523.25, type:'white', wPos:7,     label:'C5', kb:'k'},
      {note:'C#5', freq:554.37, type:'black', wPos:7.70,  label:'',   kb:'o'},
      {note:'D5',  freq:587.33, type:'white', wPos:8,     label:'D',  kb:'l'},
      {note:'D#5', freq:622.25, type:'black', wPos:8.70,  label:'',   kb:'p'},
      {note:'E5',  freq:659.25, type:'white', wPos:9,     label:'E',  kb:';'},
      {note:'F5',  freq:698.46, type:'white', wPos:10,    label:'F',  kb:"'"},
      {note:'F#5', freq:739.99, type:'black', wPos:10.70, label:'',   kb:''},
      {note:'G5',  freq:783.99, type:'white', wPos:11,    label:'G',  kb:''},
      {note:'G#5', freq:830.61, type:'black', wPos:11.70, label:'',   kb:''},
      {note:'A5',  freq:880.00, type:'white', wPos:12,    label:'A',  kb:''},
      {note:'A#5', freq:932.33, type:'black', wPos:12.70, label:'',   kb:''},
      {note:'B5',  freq:987.77, type:'white', wPos:13,    label:'B',  kb:''},
      // C6
      {note:'C6',  freq:1046.50, type:'white', wPos:14,   label:'C6', kb:''},
    ];

    const NUM_WHITE = 15;

    /* ── Audio ────────────────────────────────────────────── */
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    const comp  = audio.createDynamicsCompressor();
    comp.threshold.value = -18;
    comp.knee.value      = 10;
    comp.ratio.value     = 4;
    comp.attack.value    = 0.003;
    comp.release.value   = 0.25;
    comp.connect(audio.destination);

    let displayTimer = null;

    function tocarNota(freq, noteName) {
      if (audio.state === 'suspended') audio.resume();
      const t   = audio.currentTime;
      const dur = 3.0;

      /* lowpass sweep: bright attack → warm tail */
      const filt = audio.createBiquadFilter();
      filt.type = 'lowpass';
      filt.Q.value = 1.2;
      filt.frequency.setValueAtTime(5500, t);
      filt.frequency.exponentialRampToValueAtTime(700, t + 0.35);
      filt.frequency.exponentialRampToValueAtTime(300, t + dur * 0.6);
      filt.connect(comp);

      /* ADSR envelope */
      const env = audio.createGain();
      env.connect(filt);
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(0.72, t + 0.009);
      env.gain.exponentialRampToValueAtTime(0.001, t + dur);

      /* fundamental + overtones */
      [
        {type:'triangle', mult:1,   vol:1.00},
        {type:'sine',     mult:2,   vol:0.32},
        {type:'sine',     mult:3,   vol:0.16},
        {type:'sine',     mult:4,   vol:0.08},
        {type:'sine',     mult:5,   vol:0.04},
      ].forEach(({type, mult, vol}) => {
        const f = freq * mult;
        if (f >= audio.sampleRate / 2) return;
        const osc = audio.createOscillator();
        const g   = audio.createGain();
        osc.type = type; osc.frequency.value = f; g.gain.value = vol;
        osc.connect(g); g.connect(env);
        osc.start(t); osc.stop(t + dur);
      });

      /* note display */
      const disp = document.getElementById('notaDisplay');
      disp.textContent = noteName;
      disp.style.color = '#ffe580';
      clearTimeout(displayTimer);
      displayTimer = setTimeout(() => {
        disp.textContent = '—';
        disp.style.color = '#f5d78e';
      }, 2500);
    }

    /* ── Build keyboard ───────────────────────────────────── */
    function buildPiano() {
      const pk = document.getElementById('pianoKeys');
      const gutter = 24;                                        // frame side padding × 2
      const maxW = Math.min(window.innerWidth - 40 - gutter, 880);
      const W  = maxW / NUM_WHITE;
      const H  = Math.min(220, Math.max(140, window.innerHeight * 0.28));
      const BW = W * 0.58;
      const BH = H * 0.62;

      pk.style.width  = maxW + 'px';
      pk.style.height = H   + 'px';
      pk.innerHTML = '';

      /* white keys first (z-index 1), black on top (z-index 2) */
      [
        ...KEYS.filter(k => k.type === 'white'),
        ...KEYS.filter(k => k.type === 'black'),
      ].forEach(key => {
        const el = document.createElement('div');
        el.className   = `key ${key.type}`;
        el.dataset.note = key.note;

        if (key.type === 'white') {
          el.style.left   = (key.wPos * W) + 'px';
          el.style.width  = W + 'px';
          el.style.height = H + 'px';
          if (key.label) {
            const lbl = document.createElement('span');
            lbl.className   = 'key-label' + (key.label.startsWith('C') ? ' c-mark' : '');
            lbl.textContent = key.label;
            el.appendChild(lbl);
          }
          if (key.kb) {
            const kb = document.createElement('span');
            kb.className   = 'key-kb';
            kb.textContent = key.kb.toUpperCase();
            el.appendChild(kb);
          }
        } else {
          el.style.left   = (key.wPos * W) + 'px';
          el.style.width  = BW + 'px';
          el.style.height = BH + 'px';
        }
        pk.appendChild(el);
      });

      document.getElementById('hint').textContent =
        'Keyboard — white keys: a s d f g h j  ·  k l ; \'  ·  black keys: w e t y u  ·  o p';
    }

    buildPiano();
    window.addEventListener('resize', buildPiano);

    /* ── Interaction ──────────────────────────────────────── */
    function getKey(x, y) {
      const el = document.elementFromPoint(x, y);
      return el ? el.closest('.key') : null;
    }
    function pressKey(el) {
      if (!el || !el.classList.contains('key')) return;
      if (el.classList.contains('pressed')) return;
      el.classList.add('pressed');
      const kd = KEYS.find(k => k.note === el.dataset.note);
      if (kd) tocarNota(kd.freq, kd.note);
    }
    function releaseKey(el) {
      if (el) el.classList.remove('pressed');
    }

    /* touch — multi-finger chords */
    const touchMap = new Map();
    const pk = document.getElementById('pianoKeys');

    pk.addEventListener('touchstart', e => {
      e.preventDefault();
      if (audio.state === 'suspended') audio.resume();
      for (const t of e.changedTouches) {
        const el = getKey(t.clientX, t.clientY);
        touchMap.set(t.identifier, el);
        pressKey(el);
      }
    }, {passive:false});

    pk.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        const el   = getKey(t.clientX, t.clientY);
        const prev = touchMap.get(t.identifier);
        if (el !== prev) { releaseKey(prev); touchMap.set(t.identifier, el); pressKey(el); }
      }
    }, {passive:false});

    pk.addEventListener('touchend', e => {
      for (const t of e.changedTouches) { releaseKey(touchMap.get(t.identifier)); touchMap.delete(t.identifier); }
    });
    pk.addEventListener('touchcancel', e => {
      for (const t of e.changedTouches) { releaseKey(touchMap.get(t.identifier)); touchMap.delete(t.identifier); }
    });

    /* mouse */
    let mDown = false, mEl = null;
    pk.addEventListener('mousedown',  e => { mDown=true; mEl=e.target.closest('.key'); pressKey(mEl); });
    pk.addEventListener('mousemove',  e => {
      if (!mDown) return;
      const el = e.target.closest('.key');
      if (el !== mEl) { releaseKey(mEl); mEl=el; pressKey(mEl); }
    });
    pk.addEventListener('mouseup',    () => { mDown=false; releaseKey(mEl); mEl=null; });
    pk.addEventListener('mouseleave', () => { mDown=false; releaseKey(mEl); mEl=null; });

    /* keyboard shortcuts */
    const kbMap = {};
    KEYS.forEach(k => { if (k.kb) kbMap[k.kb] = k; });

    document.addEventListener('keydown', e => {
      if (e.repeat) return;
      const kd = kbMap[e.key];
      if (!kd) return;
      e.preventDefault();
      pressKey(pk.querySelector(`[data-note="${kd.note}"]`));
    });
    document.addEventListener('keyup', e => {
      const kd = kbMap[e.key];
      if (!kd) return;
      releaseKey(pk.querySelector(`[data-note="${kd.note}"]`));
    });
  </script>
</body>
</html>
