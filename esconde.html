<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Where is Olivia?</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      width:100vw; height:100vh; overflow:hidden;
      font-family:'Arial Rounded MT Bold', Arial, sans-serif;
      -webkit-tap-highlight-color:transparent;
      user-select:none; -webkit-user-select:none;
    }

    /* ── Scene ───────────────────────────────────────── */
    .scene {
      position:fixed; inset:0;
      background:linear-gradient(180deg,
        #87CEEB 0%, #B0E0FF 52%,
        #90EE90 52%, #3a8c3a 100%);
    }

    /* Sun */
    .sun {
      position:absolute; top:4%; right:8%;
      font-size:clamp(3rem,7vw,5rem);
      pointer-events:none;
      animation:sunPulse 4s ease-in-out infinite;
    }
    @keyframes sunPulse {
      0%,100%{transform:scale(1) rotate(0)}
      50%    {transform:scale(1.08) rotate(5deg)}
    }

    /* Clouds */
    .cloud {
      position:absolute; font-size:clamp(2rem,5vw,3.5rem);
      pointer-events:none; opacity:0.85;
      animation:drift 25s ease-in-out infinite alternate;
    }
    @keyframes drift { from{transform:translateX(0)} to{transform:translateX(18px)} }

    /* ── Header ──────────────────────────────────────── */
    .header {
      position:fixed; top:0; left:0; width:100%;
      padding:10px 16px;
      display:flex; justify-content:space-between; align-items:center;
      z-index:200;
      background:linear-gradient(to bottom,rgba(135,206,235,0.8),transparent);
    }
    .titulo {
      font-size:clamp(1rem,3.5vw,1.5rem);
      color:white; text-shadow:0 2px 8px rgba(0,0,80,0.3);
    }
    .score {
      background:rgba(255,255,255,0.35);
      border:2px solid rgba(255,255,255,0.55);
      border-radius:20px; padding:4px 14px;
      font-size:clamp(0.85rem,2.5vw,1rem);
      color:white; text-shadow:0 1px 4px rgba(0,0,0,0.2);
    }
    .btn-home {
      position:fixed; top:12px; right:14px;
      background:rgba(255,255,255,0.3);
      border:2px solid rgba(255,255,255,0.5);
      border-radius:12px; padding:4px 10px;
      font-size:1.2rem; text-decoration:none; z-index:210;
    }

    /* ── Hiding spots ────────────────────────────────── */
    .spot {
      position:absolute; cursor:pointer; z-index:10;
      -webkit-tap-highlight-color:transparent;
    }
    .spot.wrong { animation:wobble 0.5s ease; }
    @keyframes wobble {
      0%  {transform:rotate(0)}
      18% {transform:rotate(-9deg)}
      38% {transform:rotate(9deg)}
      56% {transform:rotate(-5deg)}
      74% {transform:rotate(3deg)}
      100%{transform:rotate(0)}
    }

    /* ── Olivia character ────────────────────────────── */
    .olivia-char {
      position:absolute; z-index:5;
      pointer-events:none;
      display:flex; flex-direction:column; align-items:center;
    }
    .olivia-face {
      width:82px; height:82px; border-radius:50%;
      overflow:hidden;
      border:4px solid white;
      box-shadow:0 4px 18px rgba(0,0,0,0.35);
      flex-shrink:0;
    }
    .olivia-face img {
      width:100%; height:100%;
      object-fit:cover; object-position:50% 12%;
      display:block; pointer-events:none; draggable:false;
    }
    .olivia-body { margin-top:-4px; flex-shrink:0; }

    /* Revealed animation */
    .olivia-char.revealed {
      z-index:80;
      animation:revealPop 0.75s cubic-bezier(.36,.07,.19,.97) forwards;
    }
    @keyframes revealPop {
      0%  {transform:scale(0.4) rotate(-8deg); opacity:0.4}
      35% {transform:scale(1.4) rotate(6deg);  opacity:1}
      55% {transform:scale(0.9) rotate(-3deg); opacity:1}
      72% {transform:scale(1.18) rotate(2deg); opacity:1}
      88% {transform:scale(0.96) rotate(0);    opacity:1}
      100%{transform:scale(1) rotate(0);       opacity:1}
    }

    /* ── Peek sparkle hint ───────────────────────────── */
    .peek-hint {
      position:absolute; z-index:25;
      font-size:1.1rem; pointer-events:none;
      animation:sparkle 1.1s ease-in-out infinite;
    }
    @keyframes sparkle {
      0%,100%{opacity:0.25; transform:scale(0.8)}
      50%    {opacity:1;    transform:scale(1.3)}
    }

    /* ── "Found you!" overlay ────────────────────────── */
    .achou-overlay {
      position:fixed; inset:0; z-index:100;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      pointer-events:none; opacity:0;
      transition:opacity 0.3s;
    }
    .achou-overlay.show { opacity:1; pointer-events:auto; }

    .achou-text {
      font-size:clamp(2.5rem,8vw,4rem);
      color:white;
      text-shadow:0 4px 20px rgba(0,0,0,0.35), 0 0 50px rgba(255,220,0,0.6);
      animation:achouPop 0.55s cubic-bezier(.36,.07,.19,.97) both;
      margin-bottom:1.4rem; text-align:center;
    }
    @keyframes achouPop {
      0% {transform:scale(0); opacity:0}
      65%{transform:scale(1.25); opacity:1}
      100%{transform:scale(1); opacity:1}
    }

    .btn-hide-again {
      background:linear-gradient(135deg,#FF69B4,#FF1493);
      border:3px solid white; border-radius:30px;
      padding:0.8rem 2.2rem;
      font-size:clamp(1.1rem,3.5vw,1.4rem);
      color:white; font-family:inherit; cursor:pointer;
      animation:achouPop 0.55s 0.25s cubic-bezier(.36,.07,.19,.97) both;
      box-shadow:0 6px 20px rgba(255,20,147,0.4);
      -webkit-tap-highlight-color:transparent;
    }

    /* ── Confetti ────────────────────────────────────── */
    .confetti {
      position:fixed; pointer-events:none; z-index:95;
      animation:confettiFall linear forwards;
      border-radius:2px;
    }
    @keyframes confettiFall {
      0%  {transform:translateY(-20px) rotate(0); opacity:1}
      100%{transform:translateY(105vh) rotate(720deg); opacity:0}
    }
  </style>
</head>
<body>
  <a href="index.html" class="btn-home">🏠</a>

  <div class="scene" id="scene">
    <div class="sun">☀️</div>
    <div class="cloud" style="top:6%;left:12%">☁️</div>
    <div class="cloud" style="top:3%;left:42%;font-size:2.2rem;animation-delay:-10s">☁️</div>
    <div class="cloud" style="top:8%;left:68%;animation-delay:-5s;font-size:2.8rem">☁️</div>
  </div>

  <div class="header">
    <div class="titulo">🔍 Where is Olivia?</div>
    <div class="score">Found: <span id="count">0</span> ⭐</div>
  </div>

  <!-- Found overlay -->
  <div class="achou-overlay" id="achouOverlay">
    <div class="achou-text">Found you! 🎉</div>
    <button class="btn-hide-again" id="btnHide">Hide again! 🙈</button>
  </div>

  <script>
    /* ── Spot definitions ──────────────────────────────────
       peekSide: 'top' | 'left' | 'right'
       pos: { left, bottom } as % strings for CSS           */
    const SPOT_DEFS = [
      {
        id:0, peekSide:'top',
        css:{ left:'5%', bottom:'30%' },
        svgW:130, svgH:210,
        svg:`<svg width="130" height="210" viewBox="0 0 130 210" xmlns="http://www.w3.org/2000/svg">
          <rect x="50" y="135" width="28" height="75" fill="#8B5E3C"/>
          <ellipse cx="65" cy="125" rx="58" ry="52" fill="#27AE60"/>
          <ellipse cx="65" cy="97"  rx="50" ry="46" fill="#2ECC40"/>
          <ellipse cx="65" cy="70"  rx="40" ry="37" fill="#27AE60"/>
          <ellipse cx="65" cy="46"  rx="27" ry="25" fill="#58D68D"/>
          <circle cx="88" cy="105" r="7" fill="#FF4136" opacity="0.85"/>
          <circle cx="45" cy="88"  r="6" fill="#FF4136" opacity="0.85"/>
          <circle cx="72" cy="78"  r="5" fill="#FFD700" opacity="0.9"/>
        </svg>`
      },
      {
        id:1, peekSide:'left',
        css:{ left:'27%', bottom:'20%' },
        svgW:145, svgH:195,
        svg:`<svg width="145" height="195" viewBox="0 0 145 195" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="88" width="129" height="107" fill="#F4A460" rx="6"/>
          <polygon points="0,90 72,8 145,90" fill="#E74C3C"/>
          <rect x="8" y="88" width="129" height="8" fill="#C0392B"/>
          <rect x="22" y="108" width="36" height="36" fill="#AED6F1" rx="4"/>
          <line x1="40" y1="108" x2="40" y2="144" stroke="#85C1E9" stroke-width="2"/>
          <line x1="22" y1="126" x2="58" y2="126" stroke="#85C1E9" stroke-width="2"/>
          <rect x="87" y="108" width="36" height="36" fill="#AED6F1" rx="4"/>
          <line x1="105" y1="108" x2="105" y2="144" stroke="#85C1E9" stroke-width="2"/>
          <line x1="87" y1="126" x2="123" y2="126" stroke="#85C1E9" stroke-width="2"/>
          <rect x="50" y="148" width="45" height="47" fill="#7B5C3A" rx="5"/>
          <circle cx="88" cy="174" r="5" fill="#FFD700"/>
          <rect x="60" y="24" width="24" height="28" fill="#8B0000" rx="2"/>
          <circle cx="72" cy="16" r="11" fill="#FFD700"/>
        </svg>`
      },
      {
        id:2, peekSide:'top',
        css:{ left:'54%', bottom:'18%' },
        svgW:120, svgH:220,
        svg:`<svg width="120" height="220" viewBox="0 0 120 220" xmlns="http://www.w3.org/2000/svg">
          <path d="M60 75 Q55 150 60 220" stroke="#27AE60" stroke-width="10" stroke-linecap="round" fill="none"/>
          <ellipse cx="35" cy="148" rx="26" ry="11" fill="#27AE60" transform="rotate(-32 35 148)"/>
          <ellipse cx="88" cy="163" rx="24" ry="10" fill="#2ECC40" transform="rotate(28 88 163)"/>
          <ellipse cx="60" cy="34" rx="19" ry="35" fill="#FF69B4"/>
          <ellipse cx="60" cy="34" rx="19" ry="35" fill="#FF69B4" transform="rotate(45 60 34)"/>
          <ellipse cx="60" cy="34" rx="19" ry="35" fill="#FFB6C1" transform="rotate(90 60 34)"/>
          <ellipse cx="60" cy="34" rx="19" ry="35" fill="#FFB6C1" transform="rotate(135 60 34)"/>
          <circle cx="60" cy="34" r="20" fill="#FFD700"/>
          <circle cx="60" cy="34" r="12" fill="#FF8C00"/>
          <circle cx="60" cy="34" r="5"  fill="#8B4513"/>
        </svg>`
      },
      {
        id:3, peekSide:'right',
        css:{ left:'73%', bottom:'24%' },
        svgW:165, svgH:125,
        svg:`<svg width="165" height="125" viewBox="0 0 165 125" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="42"  cy="82" rx="40" ry="48" fill="#27AE60"/>
          <ellipse cx="88"  cy="72" rx="54" ry="58" fill="#2ECC40"/>
          <ellipse cx="134" cy="80" rx="37" ry="46" fill="#27AE60"/>
          <ellipse cx="85"  cy="58" rx="40" ry="32" fill="#58D68D"/>
          <circle cx="38"  cy="36" r="10" fill="#FF69B4"/>
          <circle cx="38"  cy="36" r="6"  fill="#FFD700"/>
          <circle cx="72"  cy="22" r="12" fill="#FF6B6B"/>
          <circle cx="72"  cy="22" r="7"  fill="#FFD700"/>
          <circle cx="112" cy="26" r="10" fill="#DDA0DD"/>
          <circle cx="112" cy="26" r="6"  fill="#FFD700"/>
          <circle cx="144" cy="38" r="9"  fill="#FF69B4"/>
          <circle cx="144" cy="38" r="5"  fill="#FFD700"/>
        </svg>`
      },
    ];

    /* ── Olivia character body SVG ────────────────────── */
    const BODY_SVG = `<svg class="olivia-body" width="78" height="105"
      viewBox="0 0 78 105" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="39" cy="46" rx="31" ry="42" fill="#FFB7C5"/>
      <ellipse cx="39" cy="58" rx="34" ry="30" fill="#FFB7C5"/>
      <circle cx="27" cy="38" r="4" fill="rgba(255,255,255,0.55)"/>
      <circle cx="50" cy="33" r="3" fill="rgba(255,255,255,0.55)"/>
      <circle cx="40" cy="52" r="3.5" fill="rgba(255,255,255,0.55)"/>
      <ellipse cx="8"  cy="36" rx="10" ry="5" fill="#FFDAB9" transform="rotate(-25 8 36)"/>
      <ellipse cx="70" cy="36" rx="10" ry="5" fill="#FFDAB9" transform="rotate(25 70 36)"/>
      <circle  cx="3"  cy="32" r="5" fill="#FFDAB9"/>
      <circle  cx="75" cy="32" r="5" fill="#FFDAB9"/>
      <rect x="20" y="78" width="14" height="28" rx="7" fill="#fff"/>
      <rect x="44" y="78" width="14" height="28" rx="7" fill="#fff"/>
      <ellipse cx="27" cy="105" rx="12" ry="5" fill="#FFB7C5"/>
      <ellipse cx="51" cy="105" rx="12" ry="5" fill="#FFB7C5"/>
      <path d="M30,80 Q39,74 48,80 Q39,86 30,80Z" fill="#FF69B4"/>
      <circle cx="39" cy="80" r="4" fill="#FF1493"/>
    </svg>`;

    const CHAR_W = 82;   /* face circle width  */
    const PEEK   = 26;   /* pixels visible     */

    let activeSpot = -1;
    let found = 0;
    let busy  = false;

    const scene        = document.getElementById('scene');
    const achouOverlay = document.getElementById('achouOverlay');
    const countEl      = document.getElementById('count');

    /* ── Build character ────────────────────────────── */
    const oliviaEl = document.createElement('div');
    oliviaEl.className = 'olivia-char';
    oliviaEl.innerHTML = `
      <div class="olivia-face">
        <img src="olivia.jpeg" alt="Olivia" draggable="false">
      </div>${BODY_SVG}`;
    scene.appendChild(oliviaEl);

    /* ── Build spots ─────────────────────────────────── */
    const peekHintEl = document.createElement('div');
    peekHintEl.className = 'peek-hint';
    peekHintEl.textContent = '✨';
    scene.appendChild(peekHintEl);

    SPOT_DEFS.forEach(def => {
      const el = document.createElement('div');
      el.className = 'spot';
      el.id = `spot-${def.id}`;
      Object.assign(el.style, def.css);
      el.innerHTML = def.svg;

      function tap() { clickSpot(def.id); }
      el.addEventListener('touchstart', e => { e.preventDefault(); tap(); }, {passive:false});
      el.addEventListener('click', tap);
      scene.appendChild(el);
    });

    /* ── Position Olivia behind a spot ──────────────── */
    function positionOlivia(spotIdx) {
      const def    = SPOT_DEFS[spotIdx];
      const spotEl = document.getElementById(`spot-${spotIdx}`);
      const scRect = scene.getBoundingClientRect();
      const spRect = spotEl.getBoundingClientRect();

      /* spot coords relative to scene */
      const sx = spRect.left - scRect.left;
      const sy = spRect.top  - scRect.top;
      const sw = spRect.width;
      const sh = spRect.height;

      let ox, oy, hx, hy;

      switch (def.peekSide) {
        case 'top':
          /* hair peeks above the object */
          ox = sx + sw / 2 - CHAR_W / 2;
          oy = sy - PEEK;
          hx = sx + sw / 2 - 10;
          hy = sy - PEEK - 22;
          break;
        case 'left':
          /* face peeks from the left side */
          ox = sx - CHAR_W + PEEK;
          oy = sy + sh * 0.15;
          hx = sx - PEEK - 16;
          hy = sy + sh * 0.15 + CHAR_W / 2 - 10;
          break;
        case 'right':
          /* face peeks from the right side */
          ox = sx + sw - PEEK;
          oy = sy + sh * 0.15;
          hx = sx + sw + 4;
          hy = sy + sh * 0.15 + CHAR_W / 2 - 10;
          break;
      }

      oliviaEl.style.left = ox + 'px';
      oliviaEl.style.top  = oy + 'px';
      peekHintEl.style.left = hx + 'px';
      peekHintEl.style.top  = hy + 'px';
      peekHintEl.style.display = 'block';
    }

    /* ── Audio ───────────────────────────────────────── */
    const audio = new (window.AudioContext || window.webkitAudioContext)();

    function playWrong() {
      if (audio.state === 'suspended') audio.resume();
      const t = audio.currentTime;
      const osc = audio.createOscillator();
      const g   = audio.createGain();
      osc.connect(g); g.connect(audio.destination);
      osc.type = 'sine'; osc.frequency.value = 300;
      osc.frequency.linearRampToValueAtTime(180, t + 0.3);
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
    }

    function playFound() {
      if (audio.state === 'suspended') audio.resume();
      [523, 659, 784, 1047].forEach((f, i) => {
        const t = audio.currentTime + i * 0.13;
        const osc = audio.createOscillator();
        const g   = audio.createGain();
        osc.connect(g); g.connect(audio.destination);
        osc.type = 'triangle'; osc.frequency.value = f;
        g.gain.setValueAtTime(0.3, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
        osc.start(t); osc.stop(t + 0.55);
      });
    }

    /* ── Confetti ────────────────────────────────────── */
    function launchConfetti() {
      const colors = ['#FF69B4','#FFD700','#87CEEB','#98FB98','#DDA0DD','#FF6347','#FFA500'];
      for (let i = 0; i < 48; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        const size = 8 + Math.random() * 9;
        el.style.cssText = `
          left:${Math.random()*100}vw;
          top:-20px;
          width:${size}px; height:${size}px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          border-radius:${Math.random()>.5?'50%':'3px'};
          animation-duration:${2+Math.random()*1.8}s;
          animation-delay:${Math.random()*0.9}s;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4500);
      }
    }

    /* ── Game logic ──────────────────────────────────── */
    function newRound() {
      busy = false;
      achouOverlay.classList.remove('show');
      oliviaEl.classList.remove('revealed');
      oliviaEl.style.zIndex = 5;

      let next;
      do { next = Math.floor(Math.random() * SPOT_DEFS.length); }
      while (next === activeSpot && SPOT_DEFS.length > 1);
      activeSpot = next;

      setTimeout(() => positionOlivia(activeSpot), 60);
    }

    function clickSpot(idx) {
      if (busy) return;
      if (audio.state === 'suspended') audio.resume();

      if (idx === activeSpot) {
        busy = true;
        peekHintEl.style.display = 'none';
        oliviaEl.classList.add('revealed');
        oliviaEl.style.zIndex = 85;
        playFound();
        launchConfetti();
        found++;
        countEl.textContent = found;
        setTimeout(() => achouOverlay.classList.add('show'), 750);
      } else {
        playWrong();
        const el = document.getElementById(`spot-${idx}`);
        el.classList.remove('wrong');
        void el.offsetWidth;
        el.classList.add('wrong');
        el.addEventListener('animationend', () => el.classList.remove('wrong'), {once:true});
      }
    }

    /* ── Init ────────────────────────────────────────── */
    document.getElementById('btnHide').addEventListener('click', newRound);
    document.getElementById('btnHide').addEventListener('touchstart', e => {
      e.preventDefault(); newRound();
    }, {passive:false});

    window.addEventListener('resize', () => {
      if (!busy && activeSpot >= 0) positionOlivia(activeSpot);
    });

    newRound();
  </script>
</body>
</html>
