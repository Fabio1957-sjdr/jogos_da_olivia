<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Color Play</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#1a1a2e; }

    canvas {
      display:block; position:fixed; inset:0;
      touch-action:none;
    }

    /* barra superior: home + paleta */
    .topo {
      position:fixed; top:0; left:0; width:100%; z-index:10;
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 14px; gap:10px;
      pointer-events:none; /* pass-through exceto filhos */
    }
    .topo > * { pointer-events:auto; }

    .btn-home {
      background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.4);
      border-radius:12px; padding:0.35rem 0.75rem;
      color:white; font-size:1.2rem; text-decoration:none; flex-shrink:0;
      -webkit-tap-highlight-color:transparent;
    }

    .paleta {
      display:flex; gap:9px; align-items:center; flex-wrap:nowrap; flex-shrink:1;
    }
    .cor-btn {
      width:40px; height:40px; border-radius:50%;
      border:3px solid rgba(255,255,255,0.5);
      cursor:pointer; flex-shrink:0;
      transition:transform 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color:transparent;
    }
    .cor-btn.ativa {
      transform:scale(1.28);
      border-color:white;
      box-shadow:0 0 12px 4px rgba(255,255,255,0.35);
    }

    /* botão apagar */
    .btn-apagar {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:10;
      background:rgba(220,50,50,0.88); border:3px solid rgba(255,255,255,0.5);
      border-radius:50px; padding:0.65rem 2.5rem;
      color:white; font-size:1.35rem; font-weight:bold;
      font-family:'Arial Rounded MT Bold',Arial,sans-serif;
      cursor:pointer; -webkit-tap-highlight-color:transparent;
      box-shadow:0 4px 18px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="topo">
    <a href="index.html" class="btn-home">🏠</a>
    <div class="paleta" id="paleta"></div>
  </div>

  <button class="btn-apagar" id="btnApagar">🗑 Clear</button>

  <script>
    /* ── Canvas setup ────────────────────────────────────────── */
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const RAIO   = 6;

    function ajustar() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    ajustar();
    window.addEventListener('resize', ajustar);

    /* ── Paleta de cores ─────────────────────────────────────── */
    const CORES = [
      '#FF3333','#FF8800','#FFDD00',
      '#44FF44','#00CCFF','#4455FF',
      '#9933FF','#FF33AA','#FFFFFF',
    ];
    let corAtual = CORES[0];

    const paletaEl = document.getElementById('paleta');
    CORES.forEach((hex, i) => {
      const btn = document.createElement('div');
      btn.className = 'cor-btn' + (i === 0 ? ' ativa' : '');
      btn.style.background = hex;
      btn.style.boxShadow  = `0 0 8px 2px ${hex}55`;

      function selecionar() {
        corAtual = hex;
        document.querySelectorAll('.cor-btn').forEach(b => b.classList.remove('ativa'));
        btn.classList.add('ativa');
      }
      btn.addEventListener('touchstart', e => { e.preventDefault(); selecionar(); }, { passive: false });
      btn.addEventListener('click', selecionar);
      paletaEl.appendChild(btn);
    });

    /* ── Apagar ──────────────────────────────────────────────── */
    function apagar() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    document.getElementById('btnApagar').addEventListener('click', apagar);

    /* ── Pintura (traço suave entre pontos consecutivos) ─────── */
    const ativos = {}; /* id → {x, y} */

    function iniciar(id, x, y) {
      ativos[id] = { x, y };
      ctx.beginPath();
      ctx.arc(x, y, RAIO, 0, Math.PI * 2);
      ctx.fillStyle  = corAtual;
      ctx.shadowColor = corAtual;
      ctx.shadowBlur  = 22;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function continuar(id, x, y) {
      const prev = ativos[id];
      if (!prev) return;
      ctx.beginPath();
      ctx.moveTo(prev.x, prev.y);
      ctx.lineTo(x, y);
      ctx.strokeStyle  = corAtual;
      ctx.lineWidth    = RAIO * 2;
      ctx.lineCap      = 'round';
      ctx.lineJoin     = 'round';
      ctx.shadowColor  = corAtual;
      ctx.shadowBlur   = 22;
      ctx.stroke();
      ctx.shadowBlur   = 0;
      ativos[id] = { x, y };
    }

    function terminar(id) { delete ativos[id]; }

    /* toque */
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      for (const t of e.changedTouches) iniciar(t.identifier, t.clientX, t.clientY);
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) continuar(t.identifier, t.clientX, t.clientY);
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      for (const t of e.changedTouches) terminar(t.identifier);
    });

    /* mouse (desktop) */
    let mouseDown = false;
    canvas.addEventListener('mousedown', e => { mouseDown = true;  iniciar('m', e.clientX, e.clientY); });
    canvas.addEventListener('mousemove', e => { if (mouseDown) continuar('m', e.clientX, e.clientY);  });
    canvas.addEventListener('mouseup',   () => { mouseDown = false; terminar('m'); });
    canvas.addEventListener('mouseleave',() => { mouseDown = false; terminar('m'); });
  </script>
</body>
</html>
