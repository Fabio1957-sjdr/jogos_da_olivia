<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Jogos da Olívia</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width:100vw; min-height:100vh;
      background:linear-gradient(135deg,#667eea,#764ba2);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:'Arial Rounded MT Bold',Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
      padding:30px 20px;
    }
    h1 {
      color:white; font-size:2.2rem;
      text-shadow:0 3px 14px rgba(0,0,0,0.25);
      margin-bottom:2rem; text-align:center;
      line-height:1.2;
    }
    .jogos {
      display:flex; flex-direction:column;
      gap:16px; width:100%; max-width:460px;
    }
    .card {
      background:rgba(255,255,255,0.2);
      border:3px solid rgba(255,255,255,0.42);
      border-radius:26px; padding:1.4rem 1.6rem;
      display:flex; align-items:center; gap:1.2rem;
      text-decoration:none; color:white;
      transition:transform 0.12s, background 0.12s;
      -webkit-tap-highlight-color:transparent;
    }
    .card:active {
      transform:scale(0.95);
      background:rgba(255,255,255,0.3);
    }
    .card-icon { font-size:3rem; line-height:1; flex-shrink:0; }
    .card-info h2 { font-size:1.3rem; margin-bottom:0.25rem; }
    .card-info p  { font-size:0.88rem; opacity:0.82; font-weight:normal; }
  </style>
</head>
<body>
  <h1>🎮 Jogos da Olívia</h1>
  <div class="jogos">

    <a href="coruja.html" class="card">
      <span class="card-icon">🦉</span>
      <div class="card-info">
        <h2>Toque e Apareça</h2>
        <p>Toque na tela e veja bichinhos e frutas aparecerem!</p>
      </div>
    </a>

    <a href="livro.html" class="card">
      <span class="card-icon">📖</span>
      <div class="card-info">
        <h2>Livro de Figuras</h2>
        <p>Aprenda palavras em inglês com animais e objetos!</p>
      </div>
    </a>

    <a href="cores.html" class="card">
      <span class="card-icon">🎨</span>
      <div class="card-info">
        <h2>Jogo das Cores</h2>
        <p>Pinte com os dedos e crie desenhos coloridos!</p>
      </div>
    </a>

  </div>
</body>
</html>
